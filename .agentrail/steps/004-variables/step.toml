[step]
name = "004-variables"
status = "pending"
prompt = """
Implement the variable environment (Env) for sws.

1. Variable storage (parallel arrays):
   - var_name[MAX_VARS][MAX_VAR_NAME] — variable names
   - var_val[MAX_VARS] — value index (into value storage from step 003)
   - var_count — number of defined variables

2. Core operations:
   - env_set(name, val_idx) — set or update a variable
   - env_get(name) → value index, or -1 if undefined
   - env_has(name) → 1 if variable exists, 0 if not
   - env_unset(name) → remove variable

3. Variable substitution in token expansion:
   - Scan tokens for $var patterns
   - Replace $var with the variable's string representation
   - Support $var.field for record field access:
     - Parse "var.field" from the token after $
     - Look up var in env, then look up field in the record
     - If var is not a record, runtime error
     - If field is absent, runtime error (use exists? first)

4. Implement the exists? command:
   - exists? $var → 1 if variable is defined, 0 if not
   - exists? $var.field → 1 if var is a record AND field exists, 0 otherwise
   - exists? NEVER throws a runtime error for missing values
   - This is the safe presence-testing mechanism

5. Implement the set command:
   - set name value — set variable to string/int value
   - set name (cmd args...) — will work once command substitution exists

Test:
- set x 42; echo $x → prints 42
- exists? $x → 1
- exists? $missing → 0
- Undefined variable access → runtime error with message

Reference: docs/research.txt ($var, $var.field, exists? design)
"""
