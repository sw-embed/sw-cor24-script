[step]
name = "005-command-dispatch"
status = "pending"
prompt = """
Implement command table and dispatch loop for sws.

1. Command table (parallel arrays):
   - cmd_name[MAX_CMDS][MAX_CMD_NAME] — command name strings
   - cmd_handler[MAX_CMDS] — function pointer index for each command
   - cmd_count — number of registered commands

2. Command registration:
   - cmd_register(name, handler_index) — add command to table
   - Register built-in commands at startup

3. Main evaluation loop:
   - Read line from input (UART or script buffer)
   - Tokenize the line (step 002)
   - Expand $var substitutions in tokens (step 004)
   - Look up first token in command table
   - Dispatch to handler with remaining tokens as arguments
   - Handle unknown commands → runtime error

4. Implement initial built-in commands:
   - echo args... — print arguments separated by spaces, newline at end
   - set name value — set variable (already from step 004, wire it up)
   - exit [code] — exit interpreter with code (default 0)
   - exists? $var — safe presence test (from step 004, wire it up)

5. Script execution modes:
   - Interactive mode: read lines from UART, print prompt "sws> "
   - Script mode: read .sws file from UART/buffer, execute line by line
   - Detect mode based on input source

6. Error handling:
   - Unknown command → "error: unknown command: <name>"
   - Wrong argument count → "error: <cmd>: expected N args, got M"
   - All command handlers return success (0) or error code
   - On error in script mode, print error with line number and stop

Test:
- echo hello world → "hello world"
- set x 10; echo $x → "10"
- exit 0 → interpreter exits
- frobnicate → "error: unknown command: frobnicate"

Reference: docs/research.txt (command dispatch, execution model)
"""
